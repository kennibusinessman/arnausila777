<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сменный отчёт (моб.) — Spunbond CRM</title>
<style>
  :root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#2563eb}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;background:#e2e8f0;color:var(--text);padding:24px;display:flex;justify-content:center}
  .phone{width:330px;background:var(--bg);border-radius:26px;border:1px solid #cbd5e1;overflow:hidden;box-shadow:0 16px 50px -16px #0f172a55}
  .bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .bar b{font-size:15px}
  .badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:#e2e8f0;color:#334155}
  .body{padding:14px}
  .sec{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
  .sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin:0 0 12px}
  .line{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid #f1f5f9}
  .line:first-of-type{border-top:none}
  .line .nm{font-size:14px}
  .stepper{display:flex;align-items:center;gap:10px}
  .stepper button{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;line-height:1;color:var(--primary)}
  .stepper .q{font-size:15px;font-weight:700;min-width:34px;text-align:center;font-variant-numeric:tabular-nums}
  .submit{width:100%;font:inherit;font-weight:700;font-size:16px;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:14px;margin-top:4px}
</style>
</head>
<body>
  <div class="phone">
    <div class="bar"><b>Смена · 24.06</b><span class="badge">Черновик</span></div>
    <div class="body">
      <div class="sec">
        <h3>Выпуск продукции</h3>
        <div class="line"><span class="nm">Спанбонд 30 г/м²</span><div class="stepper"><button>−</button><span class="q">20</span><button>+</button></div></div>
        <div class="line"><span class="nm">Спанбонд 60 г/м²</span><div class="stepper"><button>−</button><span class="q">8</span><button>+</button></div></div>
      </div>
      <div class="sec">
        <h3>Расход сырья</h3>
        <div class="line"><span class="nm">Гранулы ПП</span><div class="stepper"><button>−</button><span class="q">30</span><button>+</button></div></div>
        <div class="line"><span class="nm">Краситель синий</span><div class="stepper"><button>−</button><span class="q">3</span><button>+</button></div></div>
      </div>
      <button class="submit">Отправить на утверждение</button>
    </div>
  </div>
</body>
</html>
