<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — Spunbond CRM</title>
<style>
  :root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#2563eb}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
    background:radial-gradient(1200px 500px at 70% -10%,#dbeafe,transparent),var(--bg);
    color:var(--text);min-height:540px;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    box-shadow:0 12px 40px -12px #0f172a22;width:360px;padding:28px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;margin-bottom:4px}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#4f46e5)}
  .sub{color:var(--muted);font-size:13px;margin:0 0 22px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  .control{width:100%;font:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:9px}
  .control:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px #2563eb22}
  .btn{width:100%;margin-top:20px;font:inherit;font-weight:600;font-size:14.5px;background:var(--primary);
    color:#fff;border:none;border-radius:9px;padding:11px;cursor:pointer}
  .btn:hover{background:#1d4ed8}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:16px}
</style>
</head>
<body>
  <form class="card">
    <div class="brand"><div class="logo"></div>Spunbond CRM</div>
    <p class="sub">Вход в систему управления производством</p>
    <label>Электронная почта</label>
    <input class="control" type="email" value="admin@example.com">
    <label>Пароль</label>
    <input class="control" type="password" value="············">
    <button class="btn">Войти</button>
    <div class="foot">Производство и продажи изделий из спанбонда</div>
  </form>
</body>
</html>
