<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Каркас приложения — Spunbond CRM</title>
<style>
  :root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#2563eb;--sidebar:#0f172a}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;background:var(--bg);color:var(--text)}
  .app{display:grid;grid-template-columns:220px 1fr;min-height:540px}
  .side{background:var(--sidebar);color:#cbd5e1;padding:16px 12px;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:9px;color:#fff;font-weight:700;font-size:15px;padding:6px 8px 16px}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#2563eb,#4f46e5)}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:#cbd5e1;text-decoration:none;font-size:13.5px;margin-bottom:2px}
  .nav a .i{width:16px;height:16px;border-radius:4px;background:#475569}
  .nav a.active{background:#1e293b;color:#fff}.nav a.active .i{background:var(--primary)}
  .nav a:hover{background:#1e293b}
  .me{margin-top:auto;display:flex;align-items:center;gap:9px;padding:8px;border-top:1px solid #1e293b;font-size:12.5px}
  .av{width:28px;height:28px;border-radius:50%;background:#334155;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600}
  .main{display:flex;flex-direction:column}
  .top{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
  .top h2{font-size:16px;margin:0}
  .search{flex:1;max-width:320px;margin:0 20px;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;color:var(--muted)}
  .btn{font:inherit;font-weight:600;font-size:13.5px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer}
  .content{padding:20px;color:var(--muted);font-size:13px}
  .ph{background:var(--surface);border:1px dashed var(--border);border-radius:12px;height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
</style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><div class="logo"></div>Spunbond CRM</div>
      <nav class="nav">
        <a class="active"><span class="i"></span>Дашборд</a>
        <a><span class="i"></span>Заказы</a>
        <a><span class="i"></span>Сменные отчёты</a>
        <a><span class="i"></span>Склад</a>
        <a><span class="i"></span>Отгрузки</a>
        <a><span class="i"></span>Оплаты</a>
        <a><span class="i"></span>Долги</a>
        <a><span class="i"></span>Отчёты</a>
      </nav>
      <div class="me"><div class="av">СА</div><div>Супер-админ<br><span style="color:#64748b">admin@example.com</span></div></div>
    </aside>
    <div class="main">
      <header class="top">
        <h2>Дашборд</h2>
        <input class="search" placeholder="Поиск заказов, клиентов…">
        <button class="btn">+ Новый заказ</button>
      </header>
      <div class="content">
        <div class="ph">Область контента страницы</div>
        <div class="ph" style="height:80px">KPI / таблицы / графики</div>
      </div>
    </div>
  </div>
</body>
</html>
