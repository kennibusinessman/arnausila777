<!-- @dsCard group="Основы" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Цвета — Spunbond CRM</title>
<style>
  :root{
    --bg:#f8fafc; --surface:#fff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b;
    --primary:#2563eb; --primary-hover:#1d4ed8; --primary-50:#eff6ff;
    --success:#16a34a; --success-bg:#dcfce7; --warning:#d97706; --warning-bg:#fef3c7;
    --danger:#dc2626; --danger-bg:#fee2e2; --info:#0284c7; --info-bg:#e0f2fe;
    --indigo:#4f46e5;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
    background:var(--bg);color:var(--text);padding:24px}
  h1{font-size:18px;margin:0 0 4px}
  p.sub{margin:0 0 20px;color:var(--muted);font-size:13px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:24px 0 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .sw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .chip{height:64px}
  .meta{padding:8px 10px}
  .meta b{display:block;font-size:13px}
  .meta span{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .scale{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .scale div{flex:1;height:48px}
</style>
</head>
<body>
  <h1>Цветовая палитра</h1>
  <p class="sub">Основа визуального языка CRM производства спанбонда — нейтрали, бренд и семантика.</p>

  <h2>Бренд</h2>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#eff6ff"></div><div class="meta"><b>Primary 50</b><span>#EFF6FF</span></div></div>
    <div class="sw"><div class="chip" style="background:#2563eb"></div><div class="meta"><b>Primary 600</b><span>#2563EB</span></div></div>
    <div class="sw"><div class="chip" style="background:#1d4ed8"></div><div class="meta"><b>Primary 700</b><span>#1D4ED8</span></div></div>
    <div class="sw"><div class="chip" style="background:#4f46e5"></div><div class="meta"><b>Indigo</b><span>#4F46E5</span></div></div>
  </div>

  <h2>Семантика</h2>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#16a34a"></div><div class="meta"><b>Success</b><span>#16A34A</span></div></div>
    <div class="sw"><div class="chip" style="background:#d97706"></div><div class="meta"><b>Warning</b><span>#D97706</span></div></div>
    <div class="sw"><div class="chip" style="background:#dc2626"></div><div class="meta"><b>Danger</b><span>#DC2626</span></div></div>
    <div class="sw"><div class="chip" style="background:#0284c7"></div><div class="meta"><b>Info</b><span>#0284C7</span></div></div>
  </div>

  <h2>Нейтрали (slate)</h2>
  <div class="scale">
    <div style="background:#f8fafc"></div><div style="background:#f1f5f9"></div>
    <div style="background:#e2e8f0"></div><div style="background:#cbd5e1"></div>
    <div style="background:#94a3b8"></div><div style="background:#64748b"></div>
    <div style="background:#334155"></div><div style="background:#0f172a"></div>
  </div>
</body>
</html>
