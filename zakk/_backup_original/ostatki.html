  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

span style=\"font-size:14px; font-weight:700; color:#22222e;\">{{ it.qtyLabel }}<\u002Fspan>\n                <span style=\"font-size:11.5px; color:rgba(40,40,60,0.45);\"> {{ it.unit }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:13px; font-weight:600; color:{{ it.weightColor }};\">{{ it.weightLabel }}<\u002Fspan>\n              <span style=\"{{ it.statusStyle }}\">{{ it.statusLabel }}<\u002Fspan>\n              <button style=\"width:28px; height:28px; border-radius:8px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:rgba(255,255,255,0.7);\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(40,40,60,0.4)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m9 6 6 6-6 6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:980}}\">\nclass Component extends DCLogic {\n  state = { nav: \"stock\", cat: \"all\", subcat: \"all\" };\n\n  catMeta() {\n    return {\n      span:  { full:\"Спанбонд\",             short:\"Спанбонд\",  color:\"#3f6fd6\", bg:\"rgba(91,141,239,0.13)\", bd:\"rgba(91,141,239,0.26)\", dot:\"#5b8def\" },\n      sheet: { full:\"Одноразовые простыни\", short:\"Простыни\",  color:\"#0a7f8e\", bg:\"rgba(14,165,183,0.13)\", bd:\"rgba(14,165,183,0.26)\", dot:\"#0ea5b7\" },\n      dast:  { full:\"Дастархан\",            short:\"Дастархан\", color:\"#6d52cc\", bg:\"rgba(141,107,255,0.13)\", bd:\"rgba(141,107,255,0.26)\", dot:\"#8d6bff\" },\n    };\n  }\n  subMeta() {\n    return { spunbond:\"Спанбонд\", babiny:\"Бабины\", dast_raw:\"Дастархан сырье\" };\n  }\n\n  icons() {\n    return { 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z\"/><path d=\"m3.3 7 8.7 5 8.7-5\"/><\u002Fsvg>',\n      reports:  '<svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 21V9M12 21V4M19 21v-7\"/><\u002Fsvg>',\n      settings: '<svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.2A1.6 1.6 0 0 0 6.8 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1-2.7H3a2 2 0 1 1 0-4h.2A1.6 1.6 0 0 0 4.6 6.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 2.7-1H10a2 2 0 1 1 4 0v.2a1.6 1.6 0 0 0 2.7 1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0 1 2.7H21a2 2 0 1 1 0 4h-.2a1.6 1.6 0 0 0-1.4 1z\"/><\u002Fsvg>',\n      positions:'<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3b82f6\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"/><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"/><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"/><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"/><\u002Fsvg>',\n      weight:   '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0ea5b7\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m12 3 1.8 3.5h-3.6z\"/><circle cx=\"12\" cy=\"4\" r=\"1\"/><path d=\"M5 7h14l2 13a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z\"/><\u002Fsvg>',\n      pieces:   '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f9d63\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 9l9-6 9 6v11a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z\"/><\u002Fsvg>',\n      low:      '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c47d1f\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.3 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.3a2 2 0 0 0-3.4 0z\"/><path d=\"M12 9v4M12 17h.01\"/><\u002Fsvg>',\n      out:      '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#d6553f\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"m15 9-6 6M9 9l6 6\"/><\u002Fsvg>',\n      pp:       '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6366f1\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 3h8l-1.6 3.6A6 6 0 0 1 18 12v4a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3v-4a6 6 0 0 1 3.6-5.4z\"/><path d=\"M9.5 13h.01M13 12h.01M11 15.5h.01\"/><\u002Fsvg>',\n    };\n  }\n\n  componentDidMount() { this.paintIcons(); }\n  componentDidUpdate() { this.paintIcons(); }\n  paintIcons() {\n    const ic = this.icons();\n    document.querySelectorAll('[data-icon]').forEach(n => { n.innerHTML = ic[n.getAttribute('data-icon')] || ''; });\n  }\n\n  navStyle(active) {\n    const base = \"display:flex; align-items:center; gap:13px; width:100%; border:none; cursor:pointer; font-family:inherit; font-size:13.5px; padding:11px 12px; border-radius:14px; transition:all .15s;\";\n    if (active) return base + \"background:rgba(255,255,255,0.85); color:#2a2a38; font-weight:600; box-shadow:0 6px 16px rgba(40,50,90,0.12), inset 0 1px 0 rgba(255,255,255,0.8);\";\n    return base + \"background:transparent; color:rgba(40,40,60,0.6); font-weight:500;\";\n  }\n  chipStyle(active) {\n    const base = \"display:flex; align-items:center; gap:8px; border:none; cursor:pointer; font-family:inherit; font-size:13px; padding:8px 15px; border-radius:11px; transition:all .15s;\";\n    if (active) return base + \"background:rgba(255,255,255,0.92); color:#22222e; font-weight:600; box-shadow:0 4px 12px rgba(40,50,90,0.12), inset 0 1px 0 rgba(255,255,255,0.8);\";\n    return base + \"background:transparent; color:rgba(40,40,60,0.5); font-weight:500;\";\n  }\n  subStyle(active) {\n    const base = \"border:none; cursor:pointer; font-family:inherit; font-size:12.5px; padding:7px 14px; border-radius:9px; transition:all .15s;\";\n    if (active) return base + \"background:rgba(255,255,255,0.95); color:#22222e; font-weight:600; box-shadow:0 3px 9px rgba(40,50,90,0.12);\";\n    return base + \"background:transparent; color:rgba(40,40,60,0.5); font-weight:500;\";\n  }\n  catPill(meta) {\n    return \"justify-self:start; display:inline-flex; align-items:center; gap:6px; max-width:100%; font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:99px; border:1px solid; background:\" + meta.bg + \"; color:\" + meta.color + \"; border-color:\" + meta.bd + \";\";\n  }\n  statusPill(kind) {\n    const base = \"justify-self:start; display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 11px; border-radius:99px; border:1px solid;\";\n    const map = {\n      ok:  \"background:rgba(31,157,99,0.12); color:#178a55; border-color:rgba(31,157,99,0.22);\",\n      low: \"background:rgba(240,162,60,0.13); color:#c47d1f; border-color:rgba(240,162,60,0.28);\",\n      out: \"background:rgba(214,85,63,0.12); color:#bd4836; border-color:rgba(214,85,63,0.22);\",\n    };\n    return base + (map[kind] || map.ok);\n  }\n\n  fmtNum(n) { return n.toLocaleString(\"ru-RU\"); }\n  fmtWeight(kg) { if (kg >= 1000) return (kg / 1000).toFixed(1).replace(\".\", \",\") + \" т\"; return this.fmtNum(kg) + \" кг\"; }\n\n  renderVals() {\n    const navDefs = [\n      { id:\"dash\", label:\"Дашборд\" },\n      { id:\"orders\", label:\"Отгрузки\" },\n      { id:\"shift\", label:\"Сменные отчёты\" },\n      { id:\"stock\", label:\"Остатки\" },\n      { id:\"clients\", label:\"Клиенты\" },\n      { id:\"goods\", label:\"Товары\" },\n      { id:\"reports\", label:\"Отчёты\" },\n      { id:\"settings\", label:\"Настройки\" },\n    ];\n    const navItems = navDefs.map(n => ({\n      ...n,\n      style: this.navStyle(this.state.nav === n.id),\n      select: () => this.setState({ nav: n.id }),\n    }));\n\n    const cm = this.catMeta();\n    const sm = this.subMeta();\n    const chipDefs = [\n      { id:\"all\",   label:\"Все категории\", dot:\"rgba(40,40,60,0.3)\" },\n      { id:\"span\",  label:cm.span.full,    dot:cm.span.dot },\n      { id:\"sheet\", label:cm.sheet.full,   dot:cm.sheet.dot },\n      { id:\"dast\",  label:cm.dast.full,    dot:cm.dast.dot },\n    ];\n    const catChips = chipDefs.map(c => ({\n      ...c,\n      style: this.chipStyle(this.state.cat === c.id),\n      // переключение категории сбрасывает подкатегорию\n      select: () => this.setState({ cat: c.id, subcat: \"all\" }),\n    }));\n\n    const subDefs = [\n      { id:\"all\", label:\"Все\" },\n      { id:\"spunbond\", label:sm.spunbond },\n      { id:\"babiny\", label:sm.babiny },\n      { id:\"dast_raw\", label:sm.dast_raw },\n    ];\n    const subChips = subDefs.map(s => ({\n      ...s,\n      style: this.subStyle(this.state.subcat === s.id),\n      select: () => this.setState({ subcat: s.id }),\n    }));\n\n    // данные склада. weighed: учитывается ли вес (для Дастархана — нет)\n    const raw = [\n      { sku:\"СП-040\", name:\"Спанбонд 40 г/м²\",        cat:\"span\",  sub:\"spunbond\", qty:1240, unit:\"рулонов\", weightKg:26800, status:\"ok\" },\n      { sku:\"СП-060\", name:\"Спанбонд 60 г/м²\",        cat:\"span\",  sub:\"spunbond\", qty:860,  unit:\"рулонов\", weightKg:21500, status:\"ok\" },\n      { sku:\"СП-025\", name:\"Спанбонд 25 г/м²\",        cat:\"span\",  sub:\"spunbond\", qty:320,  unit:\"рулонов\", weightKg:5400,  status:\"low\" },\n      { sku:\"ББ-16\",  name:\"Бабина ПП 1.6 м\",         cat:\"span\",  sub:\"babiny\",   qty:48,   unit:\"бабин\",   weightKg:14400, status:\"ok\" },\n      { sku:\"ББ-24\",  name:\"Бабина ПП 2.4 м\",         cat:\"span\",  sub:\"babiny\",   qty:22,   unit:\"бабин\",   weightKg:9200,  status:\"low\" },\n      { sku:\"ББ-32\",  name:\"Бабина белая 3.2 м\",      cat:\"span\",  sub:\"babiny\",   qty:0,    unit:\"бабин\",   weightKg:0,     status:\"out\" },\n      { sku:\"ДС-РЛ\",  name:\"Сырьё дастархан, рулон\",  cat:\"span\",  sub:\"dast_raw\", qty:140,  unit:\"рулонов\", weightKg:11200, status:\"ok\" },\n      { sku:\"ДС-ПП\",  name:\"ПП гранулят (дастархан)\", cat:\"span\",  sub:\"dast_raw\", qty:8600, unit:\"кг\",      weightKg:8600,  status:\"ok\" },\n      { sku:\"ДС-КР\",  name:\"Краситель (дастархан)\",   cat:\"span\",  sub:\"dast_raw\", qty:180,  unit:\"кг\",      weightKg:180,   status:\"low\" },\n      { sku:\"ПР-80\",  name:\"Простыня 80×200\",         cat:\"sheet\", sub:null,       qty:14200,unit:\"шт\",      weightKg:2130,  status:\"ok\" },\n      { sku:\"ПР-70\",  name:\"Простыня 70×200\",         cat:\"sheet\", sub:null,       qty:5400, unit:\"шт\",      weightKg:760,   status:\"low\" },\n      { sku:\"ПР-160\", name:\"Простыня 200×160\",        cat:\"sheet\", sub:null,       qty:0,    unit:\"шт\",      weightKg:0,     status:\"out\" },\n      { sku:\"ДХ-120\", name:\"Дастархан 120×120\",       cat:\"dast\",  sub:null,       qty:9600, unit:\"шт\",      weightKg:0,     status:\"ok\" },\n      { sku:\"ДХ-150\", name:\"Дастархан 150×150\",       cat:\"dast\",  sub:null,       qty:4200, unit:\"шт\",      weightKg:0,     status:\"low\" },\n      { sku:\"ДХ-РЛ\",  name:\"Дастархан рулонный\",      cat:\"dast\",  sub:null,       qty:1800, unit:\"шт\",      weightKg:0,     status:\"ok\" },\n    ];\n\n    const { cat, subcat } = this.state;\n    let list = raw.filter(it =>\n      (cat === \"all\" || it.cat === cat) &&\n      (cat !== \"span\" || subcat === \"all\" || it.sub === subcat)\n    );\n\n    const items = list.map(it => ({\n      ...it,\n      catShort: cm[it.cat].short,\n      catDot: cm[it.cat].dot,\n      catStyle: this.catPill(cm[it.cat]),\n      subLabel: it.sub ? sm[it.sub] : \"\",\n      qtyLabel: this.fmtNum(it.qty),\n      weightLabel: it.cat === \"dast\" ? \"—\" : this.fmtWeight(it.weightKg),\n      weightColor: it.cat === \"dast\" ? \"rgba(40,40,60,0.3)\" : \"#0a7f8e\",\n      statusLabel: it.status === \"ok\" ? \"В наличии\" : it.status === \"low\" ? \"Заканчивается\" : \"Нет в наличии\",\n      statusStyle: this.statusPill(it.status),\n    }));\n\n    // KPI\n    const showWeight = cat !== \"dast\";\n    const sumWeight = list.reduce((s, it) => s + (it.cat === \"dast\" ? 0 : it.weightKg), 0);\n    const sumPieces = list.reduce((s, it) => s + (it.unit === \"шт\" ? it.qty : 0), 0);\n    const lowCount = list.filter(it => it.status === \"low\").length;\n    const ppStockKg = 42600; // запас сырья ПП (полипропилен) на складе\n\n    const weightCard = showWeight\n      ? { id:\"weight\", label:\"Общий вес склада\", value:this.fmtWeight(sumWeight), valueColor:\"#1c1c22\", iconBg:\"rgba(14,165,183,0.14)\" }\n      : { id:\"pieces\", label:\"Остаток, шт\",      value:this.fmtNum(sumPieces) + \" шт\", valueColor:\"#1c1c22\", iconBg:\"rgba(31,157,99,0.14)\" };\n\n    const kpis = [\n      { id:\"positions\", label:\"Позиций на складе\", value:String(list.length), valueColor:\"#1c1c22\", iconBg:\"rgba(59,130,246,0.14)\" },\n      weightCard,\n      { id:\"low\", label:\"Заканчивается\", value:String(lowCount), valueColor: lowCount ? \"#c47d1f\" : \"#1c1c22\", iconBg:\"rgba(240,162,60,0.14)\" },\n      { id:\"pp\", label:\"Сырьё ПП\", value:this.fmtWeight(ppStockKg), valueColor:\"#1c1c22\", iconBg:\"rgba(99,102,241,0.14)\" },\n    ];\n\n    return {\n      navItems, catChips, subChips, kpis, items,\n      showSubcat: cat === \"span\",\n      itemCount: list.length + \" позиций\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
