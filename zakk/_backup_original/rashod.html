  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"32306e50-b8be-458c-8ab5-11460b505bd3\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  ::-webkit-scrollbar { width: 8px; height: 8px; }\n  ::-webkit-scrollbar-thumb { background: rgba(120,120,140,0.22); border-radius: 99px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  input[type=\"date\"]::-webkit-calendar-picker-indicator { opacity:0.5; cursor:pointer; }\n  @keyframes floatBlob { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-24px) scale(1.06); } }\n  @keyframes popIn { from { opacity:0; transform: translateY(10px) scale(0.98); } to { opacity:1; transform:none; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:relative; width:1440px; height:980px; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; color:#1c1c22; -webkit-font-smoothing:antialiased; isolation:isolate;\">\n\n  <div style=\"position:absolute; inset:0; background:linear-gradient(135deg,#eef1f6 0%,#e7ecf3 40%,#eceef4 100%); z-index:0;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:-120px; left:-80px; width:620px; height:620px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(120,165,255,0.55), rgba(120,165,255,0) 70%); filter:blur(20px); animation:floatBlob 18s ease-in-out infinite; z-index:0;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:120px; right:-140px; width:680px; height:680px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(196,150,255,0.5), rgba(196,150,255,0) 70%); filter:blur(20px); animation:floatBlob 22s ease-in-out infinite reverse; z-index:0;\"><\u002Fdiv>\n  <div style=\"position:absolute; bottom:-180px; left:38%; width:640px; height:640px; border-radius:50%; background ; flex-shrink:0; border-radius:11px; background:{{ e.catSwatch }}; display:flex; align-items:center; justify-content:center; border:1.5px solid rgba(255,255,255,0.7); box-shadow:0 3px 8px rgba(40,50,90,0.12);\" data-icon=\"{{ e.catIconId }}\"><\u002Fdiv>\n                <div style=\"min-width:0;\">\n                  <div style=\"font-size:13.5px; font-weight:600; color:#22222e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ e.name }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px; color:rgba(40,40,60,0.45); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ e.note }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-size:12.5px; color:rgba(40,40,60,0.6);\">{{ e.dateLabel }}<\u002Fspan>\n              <span style=\"{{ e.catStyle }}\">{{ e.catLabel }}<\u002Fspan>\n              <span style=\"font-size:13px; color:rgba(40,40,60,0.7); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ e.resp }}<\u002Fspan>\n              <span style=\"font-size:14px; font-weight:700; color:#22222e; text-align:right;\">{{ e.amountLabel }}<\u002Fspan>\n              <span style=\"{{ e.statusStyle }}\">{{ e.statusLabel }}<\u002Fspan>\n              <div style=\"display:flex; align-items:center; gap:4px; justify-content:flex-end;\">\n                <button onclick=\"{{ e.edit }}\" style=\"width:28px; height:28px; border-radius:8px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:rgba(255,255,255,0.7);\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(40,40,60,0.5)\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n                <button onclick=\"{{ e.remove }}\" style=\"width:28px; height:28px; border-radius:8px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:rgba(214,85,63,0.12);\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(189,72,54,0.6)\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:14px; color:rgba(40,40,60,0.4);\">\n              <svg width=\"46\" height=\"46\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(40,40,60,0.3)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 2v20l3-2 2 2 2-2 2 2 2-2 2 2 2-2V2\"><\u002Fpath><path d=\"M9 9h6M9 13h6\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font-size:14px; font-weight:600;\">Расходы не найдены<\u002Fdiv>\n              <div style=\"font-size:12.5px;\">Измените фильтры или добавьте новый расход<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- Footer total -->\n        <div style=\"display:flex; align-items:center; justify-content:flex-end; gap:16px; padding:12px 12px 0; border-top:1px solid rgba(40,40,60,0.08); margin-top:4px;\">\n          <span style=\"font-size:12.5px; font-weight:500; color:rgba(40,40,60,0.45);\">{{ countLabel }} · итого по фильтру<\u002Fspan>\n          <span style=\"font-size:17px; font-weight:700; letter-spacing:-0.01em; color:#22222e;\">{{ filteredTotal }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== ADD / EDIT EXPENSE MODAL == ont-weight:500;border-color:rgba(255,255,255,0.7);\"); }\n  catPill(m) { return \"justify-self:start;display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:99px;border:1px solid;background:\"+m.bg+\";color:\"+m.color+\";border-color:\"+m.bd+\";\"; }\n  statusPill(m) { return \"justify-self:start;font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:99px;border:1px solid;white-space:nowrap;background:\"+m.bg+\";color:\"+m.color+\";border-color:\"+m.bd+\";\"; }\n\n  fmtNum(n) { return n.toLocaleString(\"ru-RU\"); }\n  fmtMoney(n) { return this.fmtNum(n)+\"\\u00a0₸\"; }\n  fmtCompact(n) { if(!n)return\"0\\u00a0₸\"; if(n>=1000000)return(n/1000000).toFixed(1).replace(/\\.0$/,\"\")+\" млн\\u00a0₸\"; if(n>=1000)return(n/1000).toFixed(0)+\" тыс\\u00a0₸\"; return this.fmtMoney(n); }\n  fmtDate(s) { const d=new Date(s),mo=[\"янв\",\"фев\",\"мар\",\"апр\",\"май\",\"июн\",\"июл\",\"авг\",\"сен\",\"окт\",\"ноя\",\"дек\"]; return d.getDate()+\" \"+mo[d.getMonth()]; }\n\n  patchDraft(p) { this.setState(s=>({draft:{...s.draft,...p},draftError:\"\"})); }\n\n  openAdd = () => { this.setState({showAdd:true,editId:null,draftError:\"\",draft:{name:\"\",date:\"2026-06-25\",cat:\"salary\",amount:\"\",resp:\"Жанна Бекова\",status:\"pending\",note:\"\"}}); };\n  openEdit = (e) => { this.setState({showAdd:true,editId:e.id,draftError:\"\",draft:{name:e.name,date:e.date,cat:e.cat,amount:String(e.amount),resp:e.resp,status:e.status,note:e.note}}); };\n  removeExpense = (id) => { this.setState(s=>({expenses:s.expenses.filter(e=>e.id!==id)})); };\n  submitAdd = () => {\n    const d=this.state.draft;\n    if(!d.name.trim()){this.setState({draftError:\"Укажите описание расхода\"});return;}\n    const amount=parseInt(String(d.amount).replace(/\\D/g,\"\"),10)||0;\n    if(!amount){this.setState({draftError:\"Укажите сумму расхода\"});return;}\n    if(this.state.editId!=null){\n      const id=this.state.editId;\n      this.setState(s=>({expenses:s.expenses.map(e=>e.id===id?{...e,name:d.name.trim(),date:d.date,cat:d.cat,amount,resp:d.resp,status:d.status,note:d.note.trim()}:e),showAdd:false,editId:null,draftError:\"\"}));\n      return;\n    }\n    const ne={id:this.state.nextId,date:d.date,name:d.name.trim(),cat:d.cat,amount,resp:d.resp,status:d.status,note:d.note.trim()};\n    this.setState(s=>({expenses:[ne,...s.expenses],nextId:s.nextId+1,showAdd:false,editId:null,draftError:\"\"}));\n  };\n\n  renderVals() {\n    const navDefs=[{id:\"dash\",label:\"Дашборд\"},{id:\"orders\",label:\"Отгрузки\"},{id:\"shift\",label:\"Сменные отчёты\"},{id:\"stock\",label:\"Остатки\"},{id:\"payments\",label:\"Платежи\"},{id:\"expenses\",label:\"Расходы\"},{id:\"clients\",label:\"Клиенты\"},{id:\"goods\",label:\"Товары\"},{id:\"reports\",label:\"Отчёты\"},{id:\"settings\",label:\"Настройки\"}];\n    const navItems=navDefs.map(n=>({...n,style:this.navStyle(this.state.nav===n.id),select:()=>this.setState({nav:n.id})}));\n\n    const cm=this.catMeta(), sm=this.statusMeta();\n    const catTabDefs=[{id:\"all\",label:\"Все\"},{id:\"salary\",label:\"Зарплата\"},{id:\"materials\",label:\"Материалы\"},{id:\"rent\",label:\"Аренда\"},{id:\"utilities\",label:\"Коммун.\"},{id:\"equipment\",label:\"Оборудов.\"},{id:\"other\",label:\"Прочие\"}];\n    const catTabs=catTabDefs.map(c=>({...c,style:this.segStyle(this.state.cat===c.id),select:()=>this.setState({cat:c.id})}));\n    const statusTabDefs=[{id:\"all\",label:\"Все\"},{id:\"paid\",label:\"Оплачено\"},{id:\"pending\",label:\"Ожидает\"},{id:\"overdue\",label:\"Просрочено\"}];\n    const statusTabs=statusTabDefs.map(s=>({...s,style:this.segStyle(this.state.status===s.id),select:()=>this.setState({status:s.id})}));\n\n    const catOptDefs=Object.keys(cm).map(k=>({id:k,...cm[k]}));\n    const catOptions=catOptDefs.map(c=>({...c,style:this.optStyle(this.state.draft.cat===c.id),select:()=>this.patchDraft({cat:c.id})}));\n    const statusOptDefs=[{id:\"paid\",label:\"Оплачено\",dot:\"#1f9d63\"},{id:\"pending\",label:\"Ожидает\",dot:\"#f0a23c\"},{id:\"overdue\",label:\"Просрочено\",dot:\"#d6553f\"}];\n    const statusOpts=statusOptDefs.map(s=>({...s,style:this.optStyle(this.state.draft.status===s.id),select:()=>this.patchDraft({status:s.id})}));\n    const respDefs=[\"Жанна Бекова\",\"Аида Сарсенова\",\"Берик Казыханов\",\"Тимур Аленов\"];\n    const respOptions=respDefs.map(r=>({label:r,style:this.respStyle(this.state.draft.resp===r),select:()=>this.patchDraft({resp:r})}));\n\n    const {query,cat,status,sort}=this.state;\n    const q=query.trim().toLowerCase();\n    let list=this.state.expenses.filter(e=>{\n      if(cat!==\"all\"&&e.cat!==cat)return false;\n      if(status!==\"all\"&&e.status!==status)return false;\n      if(q&&!(e.name.toLowerCase().includes(q)||e.resp.toLowerCase().includes(q)))return false;\n      return true;\n    }).slice().sort((a,b)=>sort===\"amount\"?b.amount-a.amount:new Date(b.date)-new Date(a.date));\n\n    const expenses=list.map(e=>({\n      ...e,\n      dateLabel:this.fmtDate(e.date),\n      catLabel:cm[e.cat]?cm[e.cat].label:e.cat,\n      catStyle:this.catPill(cm[e.cat]||cm.other),\n      catSwatch:cm[e.cat]?cm[e.cat].swatch:cm.other.swatch,\n      catIconId:\"cat_\"+e.cat,\n      statusLabel:sm[e.status]?sm[e.status].label:e.status,\n      statusStyle:this.statusPill(sm[e.status]||sm.paid),\n      amountLabel:this.fmtMoney(e.amount),\n      note:e.note||\"\",\n      edit:()=>this.openEdit(e),\n      remove:()=>this.removeExpense(e.id),\n    }));\n\n    const all=this.state.expenses;\n    const totalAll=all.reduce((s,e)=>s+e.amount,0);\n    const paidSum=all.filter(e=>e.status===\"paid\").reduce((s,e)=>s+e.amount,0);\n    const pendingList=all.filter(e=>e.status!==\"paid\");\n    const pendingSum=pendingList.reduce((s,e)=>s+e.amount,0);\n    const filteredSum=list.reduce((s,e)=>s+e.amount,0);\n\n    const kpis=[\n      {iconId:\"kTotal\",  label:\"Всего за июнь\",   value:this.fmtCompact(totalAll),   sub:all.length+\" позиций\",                            valueColor:\"#1c1c22\", iconBg:\"rgba(91,141,239,0.14)\"},\n      {iconId:\"kPaid\",   label:\"Оплачено\",          value:this.fmtCompact(paidSum),    sub:all.filter(e=>e.status===\"paid\").length+\" позиций\", valueColor:\"#178a55\", iconBg:\"rgba(31,157,99,0.14)\"},\n      {iconId:\"kPending\",label:\"К оплате\",          value:this.fmtCompact(pendingSum), sub:pendingList.length+\" позиций\",                     valueColor:pendingSum?\"#c47d1f\":\"#1c1c22\", iconBg:\"rgba(240,162,60,0.14)\"},\n      {iconId:\"kCount\",  label:\"Категорий\",         value:String(Object.keys(cm).filter(k=>all.some(e=>e.cat===k)).length), sub:\"используется\", valueColor:\"#6d52cc\", iconBg:\"rgba(141,107,255,0.14)\"},\n    ];\n\n    const d=this.state.draft, isEdit=this.state.editId!=null;\n    return {\n      navItems,catTabs,statusTabs,catOptions,statusOpts,respOptions,kpis,expenses,\n      query,\n      isEmpty:expenses.length===0,\n      hasFilter:!!(query||cat!==\"all\"||status!==\"all\"),\n      countLabel:list.length+\" из \"+all.length,\n      filteredTotal:this.fmtMoney(filteredSum),\n      sortLabel:sort===\"amount\"?\"По сумме\":\"По дате\",\n      setQuery:(e)=>this.setState({query:e.target.value}),\n      clearFilters:()=>this.setState({query:\"\",cat:\"all\",status:\"all\"}),\n      toggleSort:()=>this.setState(s=>({sort:s.sort===\"date\"?\"amount\":\"date\"})),\n      showAdd:this.state.showAdd,\n      modalTitle:isEdit?\"Редактировать расход\":\"Новый расход\",\n      modalSubtitle:isEdit?\"Обновите данные статьи затрат\":\"Добавьте статью в реестр расходов\",\n      submitLabel:isEdit?\"Сохранить\":\"Добавить расход\",\n      openAdd:this.openAdd,\n      closeAdd:()=>this.setState({showAdd:false,editId:null}),\n      stop:(e)=>e.stopPropagation(),\n      draftName:d.name, draftDate:d.date, draftAmount:d.amount, draftNote:d.note,\n      draftError:this.state.draftError,\n      setName:  (e)=>this.patchDraft({name:e.target.value}),\n      setDate:  (e)=>this.patchDraft({date:e.target.value}),\n      setAmount:(e)=>this.patchDraft({amount:e.target.value.replace(/[^\\d]/g,\"\")}),\n      setNote:  (e)=>this.patchDraft({note:e.target.value}),\n      submitAdd:this.submitAdd,\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
