  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script>\n(function(){\n  var DESIGN_W = 1440, PHONE_MAX = 767, PHONE_SIDE = 500, PTAB_MAX = 1180;\n  function vw(){ return window.innerWidth || document.documentElement.clientWidth; }\n  function vh(){ return window.innerHeight || document.documentElement.clientHeight; }\n  function isPhone(){\n    var s = screen ? Math.min(screen.width || 9999, screen.height || 9999) : 9999;\n    return s <= PHONE_SIDE || vw() <= PHONE_MAX;\n  }\n  function isTouch(){\n    return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);\n  }\n  function isPortraitTablet(){\n    return isTouch() && vh() >= vw() && vw() <= PTAB_MAX;\n  }\n  function wantsMobile(){ return isPhone() || isPortraitTablet(); }\n  function apply(){\n    if (wantsMobile()) { try { location.replace('mobile.html'); } catch(e) { location.href = 'mobile.html'; } return; }\n    var w = vw(), k = w < DESIGN_W ? (w / DESIGN_W) : 1;\n    document.documentElement.style.setProperty('--dc-scale', String(k));\n  }\n  apply();\n  window.addEventListener('resize', apply, { passive: true });\n  window.addEventListener('orientationchange', apply);\n})();\n<\u002Fscript>\n<script src=\"daab9cf9-aa32-45c3-98c0-29f0fbdbcc6a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  ::-webkit-scrollbar { width: 8px; height: 8px; }\n  ::-webkit-scrollbar-thumb { background: rgba(120,120,140,0.22); border-radius: 99px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  input[type=\"date\"]::-webkit-calendar-picker-indicator { opacity:0.5; cursor:pointer; }\n  @keyframes floatBlob { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-24px) scale(1.06); } }\n  @keyframes popIn { from { opacity:0; transform: translateY(10px) scale(0.98); } to { opacity:1; transform:none; } }\n\n  /* ===== Адаптив: планшеты (fit-to-width) + телефоны → mobile.html ===== */\n  html { --dc-scale: 1; }\n  html, body { margin: 0; background: linear-gradient(135deg,#eef1f6 0%,#e7ecf3 40%,#eceef4 100%); }\n  body { overflow-x: hidden; }\n  helmet { display: none; }\n  x-dc { display: block; }\n  .dc-root { zoom: var(--dc-scale, 1); margin: 0 auto; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"dc-root\" style=\"position:relative; width:1440px; height:980px; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif; color:#1c1c22; -webkit-font-smoothing:antialiased; isolation:isolate;\">\n\n  <!-- Ambient studio background -->\n  <div style=\"position:absolute; inset:0; background:linear-gradient(135deg,#eef1f6 0%,#e7ecf3 40%,#eceef4 100%); z-index:0;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:-120px; left:-80px; width:620px; height:620px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(120,165,255,0.55), rgba(120,165,255,0) 70%); filter:blur(20px); animation:floatBlob 18s ease-in-out infinite; z-index:0;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:120px; right:-140px; width:680px; height:680px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(196,150,255,0.5), rgba(196,150,255,0) 70%); filter:blur(20px); animation:floatBlob 22s ease-in-out infinite reverse; z-index:0;\"><\u002Fdiv>\n  <div style=\"position:absolute; bottom:-180px; left:38%; width:640px; height:640px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(120,225,225,0.42), rgba(120,225,225,0) 70%); filter:blur(20px); animation:floatBlob 26s ease-in-out infinite; z-index:0;\"><\u002Fdiv>\n\n  <div style=\"position:relative; z-index:1; display:flex; height:100%; padding:18px; gap:18px;\">\n\n    <!-- ========== SIDEBAR ========== -->\n    <aside style=\"width:236px; flex-shrink:0; display:flex; flex-direction:column; backgro const base = \"display:flex; align-items:center; gap:7px; border:1px solid; cursor:pointer; font-family:inherit; font-size:12.5px; padding:9px 14px; border-radius:11px; transition:all .15s;\";\n    if (active) return base + \"background:rgba(255,255,255,0.95); color:#22222e; font-weight:600; border-color:rgba(91,141,239,0.5); box-shadow:0 3px 9px rgba(40,50,90,0.1);\";\n    return base + \"background:rgba(255,255,255,0.5); color:rgba(40,40,60,0.6); font-weight:500; border-color:rgba(255,255,255,0.7);\";\n  }\n  methodPill(meta) {\n    return \"justify-self:start; display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:99px; border:1px solid; background:\" + meta.bg + \"; color:\" + meta.color + \"; border-color:\" + meta.bd + \";\";\n  }\n  statusPill(kind) {\n    const base = \"justify-self:start; font-size:11.5px; font-weight:600; padding:4px 11px; border-radius:99px; border:1px solid;\";\n    if (kind === \"done\") return base + \"background:rgba(31,157,99,0.12); color:#178a55; border-color:rgba(31,157,99,0.22);\";\n    return base + \"background:rgba(240,162,60,0.13); color:#c47d1f; border-color:rgba(240,162,60,0.28);\";\n  }\n\n  fmtNum(n) { return n.toLocaleString(\"ru-RU\"); }\n  fmtMoney(n) { return this.fmtNum(n) + \" \\u20b8\"; }\n  initialsOf(name) {\n    const parts = (name || \"\").trim().split(/\\s+/);\n    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();\n    return ((parts[0] || \"?\").slice(0, 2)).toUpperCase();\n  }\n\n  patchDraft(patch) { this.setState(s => ({ draft: { ...s.draft, ...patch }, draftError: \"\" })); }\n\n  submitAdd = () => {\n    const d = this.state.draft;\n    const amount = parseInt(String(d.amount).replace(/\\D/g, \"\"), 10) || 0;\n    if (!d.client.trim()) { this.setState({ draftError: \"Укажите клиента\" }); return; }\n    if (!amount) { this.setState({ draftError: \"Укажите сумму платежа\" }); return; }\n    const pay = {\n      id: this.state.nextId,\n      client: d.client.trim(),\n      company: d.company.trim() || \"—\",\n      iso: d.date || \"2026-06-25\",\n      method: d.method,\n      purpose: d.purpose.trim() || \"Платёж\",\n      amount,\n      status: \"done\",\n    };\n    this.setState(s => ({\n      payments: [pay, ...s.payments],\n      nextId: s.nextId + 1,\n      showAdd: false,\n      draft: { client: \"\", company: \"\", date: \"2026-06-25\", method: \"kaspi\", amount: \"\", purpose: \"\" },\n      draftError: \"\",\n    }));\n  };\n\n  renderVals() {\n    const navDefs = [\n      { id:\"dash\", label:\"Дашборд\" },\n      { id:\"orders\", label:\"Отгрузки\" },\n      { id:\"shift\", label:\"Сменные отчёты\" },\n      { id:\"stock\", label:\"Остатки\" },\n      { id:\"payments\", label:\"Платежи\" },\n      { id:\"clients\", label:\"Клиенты\" },\n      { id:\"goods\", label:\"Товары\" },\n      { id:\"reports\", label:\"Отчёты\" },\n      { id:\"settings\", label:\"Настройки\" },\n    ];\n    const navItems = navDefs.map(n => ({\n      ...n,\n      style: this.navStyle(this.state.nav === n.id),\n      select: () => this.setState({ nav: n.id }),\n    }));\n\n    const mm = this.methodMeta();\n    const methodTabDefs = [\n      { id:\"all\", label:\"Все\" },\n      { id:\"kaspi\", label:\"Kaspi\" },\n      { id:\"card\", label:\"Карта\" },\n      { id:\"cash\", label:\"Наличные\" },\n      { id:\"bank\", label:\"Банк\" },\n    ];\n    const methodTabs = methodTabDefs.map(m => ({\n      ...m,\n      style: this.segStyle(this.state.method === m.id),\n      select: () => this.setState({ method: m.id }),\n    }));\n\n    const optDefs = [\n      { id:\"kaspi\", label:\"Kaspi\", dot:mm.kaspi.dot },\n      { id:\"card\",  label:\"Карта\", dot:mm.card.dot },\n      { id:\"cash\",  label:\"Наличные\", dot:mm.cash.dot },\n      { id:\"bank\",  label:\"Банк\", dot:mm.bank.dot },\n    ];\n    const methodOptions = optDefs.map(m => ({\n      ...m,\n      style: this.methodOptStyle(this.state.draft.method === m.id),\n      select: () => this.patchDraft({ method: m.id }),\n    }));\n\n    const av = [\n      \"linear-gradient(140deg,#f3a78b,#e87aa6)\",\n      \"linear-gradient(140deg,#5b8def,#7aa6ff)\",\n      \"linear-gradient(140deg,#8d6bff,#b08bff)\",\n      \"linear-gradient(140deg,#3fc6c6,#5bd9c4)\",\n      \"linear-gradient(140deg,#f0a23c,#f5c06b)\",\n      \"linear-gradient(140deg,#5bc0eb,#7ad3f0)\",\n      \"linear-gradient(140deg,#e87aa6,#f3a78b)\",\n      \"linear-gradient(140deg,#6366f1,#8d6bff)\",\n    ];\n    const months = [\"янв\",\"фев\",\"мар\",\"апр\",\"мая\",\"июн\",\"июл\",\"авг\",\"сен\",\"окт\",\"ноя\",\"дек\"];\n    const dateLabel = (iso) => { const d = new Date(iso); if (isNaN(d)) return iso; return d.getDate() + \" \" + months[d.getMonth()] + \" \" + d.getFullYear(); };\n\n    const { from, to, sortDir, method } = this.state;\n    let list = this.state.payments.filter(p =>\n      (!from || p.iso >= from) && (!to || p.iso <= to) && (method === \"all\" || p.method === method)\n    );\n    list = list.slice().sort((a, b) => sortDir === \"desc\" ? b.iso.localeCompare(a.iso) : a.iso.localeCompare(b.iso));\n\n    const payments = list.map((p, i) => ({\n      ...p,\n      avatar: av[(p.id + i) % av.length],\n      initials: this.initialsOf(p.client),\n      dateLabel: dateLabel(p.iso),\n      methodLabel: mm[p.method].label,\n      methodDot: mm[p.method].dot,\n      methodStyle: this.methodPill(mm[p.method]),\n      amountLabel: this.fmtMoney(p.amount),\n      statusLabel: p.status === \"done\" ? \"Проведён\" : \"Ожидает\",\n      statusStyle: this.statusPill(p.status),\n    }));\n\n    const doneSum = list.filter(p => p.status === \"done\").reduce((s, p) => s + p.amount, 0);\n    const pendSum = list.filter(p => p.status === \"pending\").reduce((s, p) => s + p.amount, 0);\n    const doneCount = list.filter(p => p.status === \"done\").length;\n    const avg = doneCount ? Math.round(doneSum / doneCount) : 0;\n\n    const kpis = [\n      { id:\"received\", label:\"Получено за период\", value:this.fmtMoney(doneSum), valueColor:\"#178a55\", iconBg:\"rgba(31,157,99,0.14)\" },\n      { id:\"count\",    label:\"Платежей\",           value:String(list.length),    valueColor:\"#1c1c22\", iconBg:\"rgba(59,130,246,0.14)\" },\n      { id:\"avg\",      label:\"Средний платёж\",     value:this.fmtMoney(avg),      valueColor:\"#1c1c22\", iconBg:\"rgba(139,92,246,0.14)\" },\n      { id:\"pending\",  label:\"Ожидает оплаты\",     value:this.fmtMoney(pendSum),  valueColor: pendSum ? \"#c47d1f\" : \"#1c1c22\", iconBg:\"rgba(240,162,60,0.14)\" },\n    ];\n\n    const d = this.state.draft;\n    return {\n      navItems, methodTabs, methodOptions, kpis, payments,\n      from, to,\n      hasFilter: !!(from || to || method !== \"all\"),\n      sortLabel: sortDir === \"desc\" ? \"сначала новые\" : \"сначала старые\",\n      payCount: list.length + \" платежей\",\n      setFrom: (e) => this.setState({ from: e.target.value }),\n      setTo: (e) => this.setState({ to: e.target.value }),\n      clearFilters: () => this.setState({ from: \"\", to: \"\", method: \"all\" }),\n      toggleSort: () => this.setState(s => ({ sortDir: s.sortDir === \"desc\" ? \"asc\" : \"desc\" })),\n      // modal\n      showAdd: this.state.showAdd,\n      openAdd: () => this.setState({ showAdd: true, draftError: \"\" }),\n      closeAdd: () => this.setState({ showAdd: false }),\n      stop: (e) => e.stopPropagation(),\n      draftClient: d.client, draftCompany: d.company, draftDate: d.date, draftAmount: d.amount, draftPurpose: d.purpose,\n      draftError: this.state.draftError,\n      setClient: (e) => this.patchDraft({ client: e.target.value }),\n      setCompany: (e) => this.patchDraft({ company: e.target.value }),\n      setDate: (e) => this.patchDraft({ date: e.target.value }),\n      setAmount: (e) => this.patchDraft({ amount: e.target.value.replace(/[^\\d]/g, \"\") }),\n      setPurpose: (e) => this.patchDraft({ purpose: e.target.value }),\n      submitAdd: this.submitAdd,\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"</script>
