  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

te, pmStatus, customPayments, toastMsg } = this.state;\n    const openPaymentModal  = () => this.setState({ showPaymentModal: true });\n    const closePaymentModal = () => this.setState({ showPaymentModal: false });\n    const setPmClient = e => this.setState({ pmClient: e.target.value });\n    const setPmAmount = e => this.setState({ pmAmount: e.target.value });\n    const setPmDate   = e => this.setState({ pmDate:   e.target.value });\n\n    const pmStatusDefs = [\n      { id:\"paid\",    label:\"Оплачено\"   },\n      { id:\"pending\", label:\"Ожидание\"   },\n      { id:\"overdue\", label:\"Просрочено\" },\n    ];\n    const pmStatusOptions = pmStatusDefs.map(s => ({\n      ...s,\n      select: () => this.setState({ pmStatus: s.id }),\n      style: pmStatus === s.id\n        ? \"flex:1; border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; padding:9px 4px; border-radius:12px; background:linear-gradient(140deg,#5b8def,#8d6bff); color:#fff; box-shadow:0 4px 10px rgba(91,107,255,0.26);\"\n        : \"flex:1; border:1.5px solid rgba(40,40,60,0.1); cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; padding:9px 4px; border-radius:12px; background:rgba(255,255,255,0.7); color:rgba(40,40,60,0.55);\",\n    }));\n\n    const savePayment = () => {\n      const name = pmClient.trim() || \"Новый клиент\";\n      const words = name.split(\" \").filter(Boolean);\n      const initials = words.slice(0,2).map(w => w[0].toUpperCase()).join(\"\");\n      const amount = parseFloat(String(pmAmount).replace(/\\s/g,\"\")) || 0;\n      const avIdx = customPayments.length % this.AV.length;\n      this.setState({\n        customPayments: [{ client:name, company:\"—\", initials, av:avIdx, amount, iso:pmDate, status:pmStatus }, ...this.state.customPayments],\n        showPaymentModal: false,\n        pmClient:\"\", pmAmount:\"\", pmDate:new Date().toISOString().slice(0,10), pmStatus:\"pending\",\n      });\n      setTimeout(() => showToast(\"Платёж от «\" + name + \"» добавлен\"), 50);\n    };\n\n    const pmCanSave = pmClient.trim().length > 0 && parseFloat(String(pmAmount).replace(/\\s/g,\"\")) > 0;\n    const pmSaveBtnStyle = \"flex:2; border:none; border-radius:14px; padding:13px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; color:#fff; transition:opacity .15s;\" +\n      (pmCanSave ? \"background:linear-gradient(140deg,#5b8def,#8d6bff); box-shadow:0 8px 20px rgba(91,107,255,0.32);\"\n                 : \"background:linear-gradient(140deg,#9ab4e0,#b8a3e8); opacity:0.55; cursor:not-allowed;\");\n\n    const paymentsRaw = [\n      ...customPayments,\n      { client:\"Анна Петрова\",   company:\"Acme Corp\",     initials:\"АП\", av:0, amount:148000, iso:\"2026-06-25\", status:\"paid\"    },\n      { client:\"Дмитрий Иванов\", company:\"Project X LLP\", initials:\"ДИ\", av:1, amount:92400,  iso:\"2026-06-24\", status:\"pending\" },\n      { client:\"Мия Чен\",        company:\"Initech\",       initials:\"МЧ\", av:2, amount:320000, iso:\"2026-06-23\", status:\"paid\"    },\n      { client:\"Лукас Моро\",     company:\"Globex\",        initials:\"ЛМ\", av:3, amount:54800,  iso:\"2026-06-22\", status:\"overdue\" },\n      { client:\"Сара Окафор\",    company:\"Soylent\",       initials:\"СО\", av:4, amount:176200, iso:\"2026-06-20\", status:\"pending\" },\n      { client:\"Рита Волкова\",   company:\"Stark Trading\", initials:\"РВ\", av:5, amount:205600, iso:\"2026-06-18\", status:\"paid\"    },\n      { client:\"Карим Болатов\",  company:\"Hooli KZ\",      initials:\"КБ\", av:6, amount:88300,  iso:\"2026-06-16\", status:\"overdue\" },\n    ];\n    const statusCfg = {\n      paid:    { label:\"Оплачено\",   style:\"font-size:11px; font-weight:600; padding:3px 8px; border-radius:99px; background:rgba(31,157,99,0.12); color:#1a7d50;\" },\n      pending: { label:\"Ожидание\",   style:\"font-size:11px; font-weight:600; padding:3px 8px; border-radius:99px; background:rgba(240,162,60,0.14); color:#c4720a;\" },\n      overdue: { label:\"Просрочено\", style:\"font-size:11px; font-weight:600; padding:3px 8px; border-radius:99px; background:rgba(189,72,54,0.1); color:#bd4836;\" },\n    };\n    const payTabDefs = [\n      { id:\"all\",     label:\"Все\"        },\n      { id:\"paid\",    label:\"Оплачено\"   },\n      { id:\"pending\", label:\"Ожидание\"   },\n      { id:\"overdue\", label:\"Просрочено\" },\n    ];\n    const paymentTabs = payTabDefs.map(t => ({\n      ...t,\n      select: () => this.setState({ paymentFilter: t.id }),\n      style: this.pillStyle(paymentFilter === t.id),\n    }));\n    const filteredPays = paymentFilter === \"all\" ? paymentsRaw : paymentsRaw.filter(p => p.status === paymentFilter);\n    const paymentsList = filteredPays.map(p => ({\n      ...p,\n      avatar:      this.AV[p.av % this.AV.length],\n      dateLabel:   this.dLabel(p.iso),\n      amountLabel: this.fmtMoney(p.amount),\n      statusLabel: statusCfg[p.status].label,\n      statusStyle: statusCfg[p.status].style,\n    }));\n    const paymentsCount = paymentsRaw.length;\n\n    // ── Expenses ──\n    const expRaw = [\n      { desc:\"ГСМ для транспорта\",      category:\"Топливо\",      iconId:\"fuel\",     iconBg:\"rgba(240,162,60,0.16)\",  amount:45000,  iso:\"2026-06-25\" },\n      { desc:\"Аренда склада\",           category:\"Аренда\",       iconId:\"building\", iconBg:\"rgba(91,141,239,0.14)\",  amount:180000, iso:\"2026-06-20\" },\n      { desc:\"ЗП: водители, операторы\", category:\"Зарплата\",     iconId:\"users\",    iconBg:\"rgba(31,157,99,0.14)\",   amount:320000, iso:\"2026-06-15\" },\n      { desc:\"ТО транспорта\",           category:\"Обслуживание\", iconId:\"tool\",     iconBg:\"rgba(14,165,183,0.14)\",  amount:28500,  iso:\"2026-06-12\" },\n      { desc:\"ГСМ (допзаправка)\",       category:\"Топливо\",      iconId:\"fuel\",     iconBg:\"rgba(240,162,60,0.16)\",  amount:18000,  iso:\"2026-06-10\" },\n      { desc:\"Канцтовары и связь\",      category:\"Офис\",         iconId:\"office\",   iconBg:\"rgba(139,92,246,0.14)\",  amount:12400,  iso:\"2026-06-08\" },\n      { desc:\"Разные расходы\",          category:\"Прочее\",       iconId:\"misc\",     iconBg:\"rgba(40,40,60,0.08)\",    amount:9800,   iso:\"2026-06-05\" },\n    ];\n    const expensesList = expRaw.map(e => ({ ...e, dateLabel:this.dLabel(e.iso), amountLabel:this.fmtMoney(e.amount) }));\n    const expTotal = expRaw.reduce((s,e) => s+e.amount, 0);\n    const expensesTotal = this.fmtMoney(expTotal);\n    const expensesKpi = [\n      { label:\"Итого расходов\", value:this.fmtMoney(expTotal),               color:\"#bd4836\" },\n      { label:\"Статей\",         value:String(expRaw.length),                 color:\"#22222e\" },\n      { label:\"Крупнейший\",     value:this.fmtMoney(Math.max(...expRaw.map(e=>e.amount))), color:\"#c4720a\" },\n    ];\n\n    // ── Shifts ──\n    const shiftsRaw = [\n      { dateIso:\"2026-06-25\", shift:\"1\", orders:3, weight:14200, amount:312000, operator:\"Темирлан А.\" },\n      { dateIso:\"2026-06-25\", shift:\"2\", orders:2, weight:8900,  amount:178000, operator:\"Алибек М.\"  },\n      { dateIso:\"2026-06-24\", shift:\"1\", orders:4, weight:19800, amount:428000, operator:\"Темирлан А.\" },\n      { dateIso:\"2026-06-24\", shift:\"2\", orders:1, weight:6100,  amount:73500,  operator:\"Алибек М.\"  },\n      { dateIso:\"2026-06-23\", shift:\"1\", orders:3, weight:15600, amount:320000, operator:\"Темирлан А.\" },\n      { dateIso:\"2026-06-22\", shift:\"1\", orders:2, weight:9550,  amount:231000, operator:\"Алибек М.\"  },\n    ];\n    const shiftsList = shiftsRaw.map(s => ({\n      ...s,\n      dateLabel:   this.dLabel(s.dateIso),\n      weightLabel: this.fmtWeight(s.weight),\n      amountLabel: this.fmtMoney(s.amount),\n      avgLabel:    this.fmtMoney(Math.round(s.amount/s.orders)),\n    }));\n    const shiftsCount = shiftsRaw.length;\n\n    // ── Modal (new order) ──\n    const q = mSearchQ.toLowerCase().trim();\n    const dropFiltered = (q ? PRODS.filter(p => p.name.toLowerCase().includes(q)) : PRODS).slice(0,10);\n    const mDropItems = dropFiltered.map(p => {\n      const qty     = mDropQtys[p.id] || 1;\n      const isAdded = mItems.some(i => i.id === p.id);\n      return {\n        id: p.id, name: p.name, unit: p.unit, qty: String(qty),\n        rowStyle: \"display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid rgba(40,40,60,0.04); cursor:default; transition:background .1s;\" + (isAdded ? \"background:rgba(91,141,239,0.04);\" : \"\"),\n        rowHover: isAdded ? \"background:rgba(91,141,239,0.09);\" : \"background:rgba(248,249,255,0.9);\",\n        btnStyle: isAdded\n          ? \"flex-shrink:0; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; padding:6px 12px; border-radius:10px; white-space:nowrap; background:rgba(91,141,239,0.13); color:#3f6fd6;\"\n          : \"flex-shrink:0; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; padding:6px 12px; border-radius:10px; white-space:nowrap; background:linear-gradient(140deg,#5b8def,#8d6bff); color:#fff; box-shadow:0 3px 9px rgba(91,107,255,0.28);\",\n        btnLabel: isAdded ? \"✓ Добавлено\" : \"Добавить\",\n        toggle:  () => {\n          const items = this.state.mItems;\n          if (isAdded) this.setState({ mItems: items.filter(i => i.id !== p.id) });\n          else { const curQty = this.state.mDropQtys[p.id] || 1; this.setState({ mItems: [...items, { id:p.id, qty:curQty }] }); }\n        },\n        incQty: () => { const c = this.state.mDropQtys[p.id] || 1; this.setState({ mDropQtys: { ...this.state.mDropQtys, [p.id]:c+1 } }); },\n        decQty: () => { const c = this.state.mDropQtys[p.id] || 1; this.setState({ mDropQtys: { ...this.state.mDropQtys, [p.id]:Math.max(1,c-1) } }); },\n      };\n    });\n    const mItemRows = mItems.map(item => {\n      const prod = PRODS.find(p => p.id === item.id);\n      if (!prod) return null;\n      return {\n        id: item.id, name: prod.name, qty: String(item.qty),\n        weight:   this.fmtWeight(prod.unitWeight * item.qty),\n        amount:   this.fmtMoney(prod.price * item.qty),\n        unitLine: prod.unit + \" · \" + this.fmtWeight(prod.unitWeight) + \"/ед.\",\n        inc:    () => this.setState({ mItems: this.state.mItems.map(i => i.id===item.id ? {...i,qty:i.qty+1} : i) }),\n        dec:    () => this.setState({ mItems: this.state.mItems.map(i => i.id===item.id ? {...i,qty:Math.max(1,i.qty-1)} : i) }),\n        remove: () => this.setState({ mItems: this.state.mItems.filter(i => i.id!==item.id) }),\n      };\n    }).filter(Boolean);\n    const mTotalWeight = this.fmtWeight(mItems.reduce((s,i) => { const p=PRODS.find(x=>x.id===i.id); return s+(p?p.unitWeight*i.qty:0); }, 0));\n    const mTotalAmount = this.fmtMoney(mItems.reduce((s,i)  => { const p=PRODS.find(x=>x.id===i.id); return s+(p?p.price*i.qty:0); }, 0));\n    const canSave = mItems.length > 0;\n    const baseSave = \"flex:2; border:none; border-radius:14px; padding:13px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; color:#fff; transition:opacity .15s;\";\n    const saveBtnStyle = baseSave + (canSave\n      ? \"background:linear-gradient(140deg,#5b8def,#8d6bff); box-shadow:0 8px 20px rgba(91,107,255,0.32);\"\n      : \"background:linear-gradient(140deg,#9ab4e0,#b8a3e8); opacity:0.55; cursor:not-allowed;\");\n\n    const saveOrder = () => {\n      if (!canSave) return;\n      const clientName = this.state.mClient.trim() || \"Новый клиент\";\n      const words = clientName.split(\" \").filter(Boolean);\n      const initials = words.slice(0,2).map(w=>w[0].toUpperCase()).join(\"\");\n      const names  = this.state.mItems.map(i=>(PRODS.find(p=>p.id===i.id)||{}).name).filter(Boolean);\n      const weight = this.state.mItems.reduce((s,i)=>{const p=PRODS.find(x=>x.id===i.id);return s+(p?p.unitWeight*i.qty:0);},0);\n      const amount = this.state.mItems.reduce((s,i)=>{const p=PRODS.find(x=>x.id===i.id);return s+(p?p.price*i.qty:0);},0);\n      const num = \"#\" + (10248 + this.state.customOrders.length + 1);\n      this.setState({\n        customOrders: [{ num, initials, client:clientName, company:\"—\", iso:this.state.mDate, names, weight, amount }, ...this.state.customOrders],\n        showModal:false, mClient:\"\", mDate:new Date().toISOString().slice(0,10),\n        mSearchQ:\"\", mShowDrop:false, mItems:[], mDropQtys:{}, mFocused:false,\n      });\n    };\n\n    return {\n      isOrders, isClients, isGoods, isReports, isMore,\n      isStock, isPayments, isExpenses, isShifts,\n      navTabs, goMore,\n      // orders\n      kpis, orders, orderCount,\n      from, to, hasFilter: !!(from||to),\n      setFrom: e=>this.setState({from:e.target.value}),\n      setTo:   e=>this.setState({to:e.target.value}),\n      openModal: ()=>this.setState({showModal:true}),\n      // clients\n      clients, clientCount,\n      // goods\n      productCats, productsList, goodsCount,\n      // reports\n      reportPeriods, reportKpis, chartBars, topCategories,\n      // more\n      moreTiles,\n      // stock\n      stockItems, stockTotal,\n      // payments\n      paymentTabs, paymentsList, paymentsCount,\n      // expenses\n      expensesList, expensesTotal, expensesKpi,\n      // shifts\n      shiftsList, shiftsCount,\n      // modal\n      showModal,\n      mClient, mDate, mSearchQ, mShowDrop,\n      mDropItems, mDropEmpty: dropFiltered.length === 0,\n      mItemRows, hasItems: mItemRows.length > 0,\n      mTotalWeight, mTotalAmount, saveBtnStyle, saveOrder,\n      // toast & payment modal\n      toastMsg,\n      showPaymentModal, openPaymentModal, closePaymentModal,\n      pmClient, pmAmount, pmDate, pmStatus,\n      pmStatusOptions, pmSaveBtnStyle, savePayment,\n      setPmClient, setPmAmount, setPmDate,\n      closeModal:   ()=>this.setState({showModal:false, mShowDrop:false}),\n      stopProp:     e=>e.stopPropagation(),\n      preventBlur:  e=>e.preventDefault(),\n      setMClient:   e=>this.setState({mClient:e.target.value}),\n      setMDate:     e=>this.setState({mDate:e.target.value}),\n      setMSearchQ:  e=>this.setState({mSearchQ:e.target.value, mShowDrop:true}),\n      onSearchFocus:()=>this.setState({mShowDrop:true,  mFocused:true}),\n      onSearchBlur: ()=>setTimeout(()=>this.setState({mShowDrop:false,mFocused:false}),220),\n      clearSearch:  ()=>this.setState({mSearchQ:\"\",mShowDrop:true}),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
